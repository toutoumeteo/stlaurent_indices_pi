name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]       # ex: v1.0.0 → déclenche aussi le packaging/upload
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_path: build/libstlaurent_indices_pi.so
            tarball_suffix: ubuntu-x86_64
            target_platform: ubuntu-x86_64
            target_version: "24.04"
            target_arch: x86_64

          - os: macos-latest
            artifact_path: build/libstlaurent_indices_pi.dylib
            tarball_suffix: macos-arm64
            target_platform: macos-arm64
            target_version: "14"
            target_arch: arm64

          - os: windows-latest
            artifact_path: build/Release/stlaurent_indices_pi.dll
            tarball_suffix: win-x86_64
            target_platform: msvc-wx32
            target_version: "10"
            target_arch: x86_64

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Dépendances Linux
      # -----------------------------------------------------------------------
      - name: Dépendances (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libwxgtk3.2-dev libeccodes-dev libgl-dev

      # -----------------------------------------------------------------------
      # Dépendances macOS
      # -----------------------------------------------------------------------
      - name: Dépendances (macOS)
        if: runner.os == 'macOS'
        run: brew install wxwidgets@3.2 eccodes

      # -----------------------------------------------------------------------
      # Dépendances Windows — vcpkg avec cache actions/cache
      # Premier run : ~45 min (compilation depuis les sources)
      # Runs suivants : ~2 min (restauration du cache)
      # Note: x-gha a été retiré de vcpkg → on utilise actions/cache à la place
      # -----------------------------------------------------------------------
      # OpenCPN sur Windows est une application 32-bit (x86) installée dans
      # Program Files (x86). Le plugin doit donc être 32-bit (x86-windows).
      # wxWidgets : binaires officiels 3.2 (lib/vc14x_dll = x86, suffixe _vc14x
      # sans _x64) — correspond exactement aux DLLs embarquées par OpenCPN.
      - name: Cache wxWidgets (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\wxWidgets
          key: wxwidgets-3.2.6-vc14x-x86

      - name: wxWidgets 3.2 officiel vc14x x86 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "C:\wxWidgets\lib\vc14x_dll") {
            Write-Host "wxWidgets déjà en cache."; exit 0
          }
          $v = "3.2.6"
          $base = "https://github.com/wxWidgets/wxWidgets/releases/download/v$v"
          New-Item -ItemType Directory -Force C:\wxWidgets | Out-Null
          foreach ($f in @("wxWidgets-$v-headers.7z", "wxMSW-${v}_vc14x_Dev.7z")) {
            Write-Host "Téléchargement $f..."
            Invoke-WebRequest "$base/$f" -OutFile "$env:TEMP\$f"
            7z x "$env:TEMP\$f" -oC:\wxWidgets -y | Out-Null
          }

      # eccodes v2.24.0 supporte x86 nativement (avant le drop officiel 32-bit).
      # On compile depuis les sources ; zlib (dépendance) via vcpkg x86.
      - name: Cache vcpkg zlib x86 (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-zlib-x86
          restore-keys: vcpkg-zlib-

      - name: zlib x86 pour eccodes (Windows)
        if: runner.os == 'Windows'
        run: vcpkg install zlib:x86-windows

      - name: Cache eccodes x86 (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\eccodes-x86
          key: eccodes-2.24.0-x86-win

      - name: Build eccodes x86 depuis sources (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "C:\eccodes-x86\bin\eccodes.dll") {
            Write-Host "eccodes en cache."; exit 0
          }
          # ecbuild : scripts cmake requis par eccodes (pas de compilation)
          # -A Win32 obligatoire pour le générateur Visual Studio
          git clone --depth 1 --branch 3.7.2 https://github.com/ecmwf/ecbuild.git ecbuild-src
          cmake -S ecbuild-src -B ecbuild-src/build -A Win32 -DCMAKE_INSTALL_PREFIX=C:\ecbuild
          if ($LASTEXITCODE -ne 0) { throw "ecbuild cmake configure failed" }
          cmake --install ecbuild-src/build
          if ($LASTEXITCODE -ne 0) { throw "ecbuild cmake install failed" }

          # eccodes 2.24.0 (support x86 natif)
          git clone --depth 1 --branch 2.24.0 https://github.com/ecmwf/eccodes.git eccodes-src
          cmake -S eccodes-src -B eccodes-src/build -A Win32 `
            -DCMAKE_BUILD_TYPE=Release `
            -DENABLE_MEMFS=ON `
            -DENABLE_FORTRAN=OFF `
            -DENABLE_PYTHON=OFF `
            -DENABLE_AEC=OFF `
            -DENABLE_JPG=OFF `
            -DENABLE_ECCODES_OMP_LOCKS=OFF `
            -DENABLE_EXTRA_TESTS=OFF `
            -Decbuild_DIR="C:\ecbuild\share\ecbuild\cmake" `
            -DCMAKE_PREFIX_PATH="C:\vcpkg\installed\x86-windows" `
            -DCMAKE_INSTALL_PREFIX=C:\eccodes-x86
          cmake --build eccodes-src/build --config Release --parallel
          cmake --install eccodes-src/build --config Release

      # -----------------------------------------------------------------------
      # Configuration CMake
      # -----------------------------------------------------------------------
      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -A Win32 `
            -DwxWidgets_ROOT_DIR="C:\wxWidgets" `
            -DwxWidgets_LIB_DIR="C:\wxWidgets\lib\vc14x_dll" `
            -DCMAKE_PREFIX_PATH="C:\eccodes-x86"

      # -----------------------------------------------------------------------
      # Compilation
      # -----------------------------------------------------------------------
      - name: Build
        run: cmake --build build --config Release --parallel

      # -----------------------------------------------------------------------
      # Artefact brut (téléchargeable depuis l'onglet Actions, toujours)
      # -----------------------------------------------------------------------
      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: stlaurent_indices_pi-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # Packaging tarball — seulement sur les tags v*
      # Crée un tarball avec cmake --install + tar, calcule le SHA256,
      # génère le fichier XML de catalogue OpenCPN.
      # -----------------------------------------------------------------------
      - name: Créer le tarball (Linux / macOS)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"   # retirer le "v" : v1.0.0 → 1.0.0
          TARBALL="stlaurent_indices_pi-${VERSION}-${{ matrix.tarball_suffix }}.tar.gz"

          cmake --install build --prefix /tmp/pkg
          cd /tmp/pkg && tar czf "$GITHUB_WORKSPACE/$TARBALL" .
          cd "$GITHUB_WORKSPACE"

          if command -v sha256sum >/dev/null; then
            SHA256=$(sha256sum "$TARBALL" | awk '{print $1}')
          else
            SHA256=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          fi

          echo "TARBALL=$TARBALL"       >> $GITHUB_ENV
          echo "VERSION=$VERSION"       >> $GITHUB_ENV
          echo "SHA256=$SHA256"         >> $GITHUB_ENV

      - name: Créer le tarball (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        run: |
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          $TARBALL = "stlaurent_indices_pi-$VERSION-${{ matrix.tarball_suffix }}.zip"
          cmake --install build --config Release --prefix $env:TEMP\pkg

          # Copier les DLLs runtime de vcpkg dans plugins/
          # wx* est exclu : fourni par OpenCPN lui-même
          # DLLs eccodes (x86) + zlib (dépendance d'eccodes)
          $dest = "$env:TEMP\pkg\plugins"
          Get-ChildItem "C:\eccodes-x86\bin\*.dll" |
            ForEach-Object { Copy-Item $_.FullName $dest }
          Copy-Item "C:\vcpkg\installed\x86-windows\bin\zlib1.dll" $dest -ErrorAction SilentlyContinue

          Compress-Archive -Path "$env:TEMP\pkg\*" -DestinationPath $TARBALL
          $SHA256 = (Get-FileHash $TARBALL -Algorithm SHA256).Hash.ToLower()
          echo "TARBALL=$TARBALL"    >> $env:GITHUB_ENV
          echo "VERSION=$VERSION"   >> $env:GITHUB_ENV
          echo "SHA256=$SHA256"     >> $env:GITHUB_ENV

      - name: Générer le XML de catalogue
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          CLOUDSMITH_USER="${{ secrets.CLOUDSMITH_USER }}"
          URL="https://dl.cloudsmith.io/public/${CLOUDSMITH_USER}/stlaurent-indices-pi/raw/files/${TARBALL}"
          XML="catalog_${{ matrix.tarball_suffix }}.xml"

          sed \
            -e "s|@PLUGIN_VERSION@|${VERSION}|g" \
            -e "s|@TARBALL_URL@|${URL}|g" \
            -e "s|@TARBALL_SHA256@|${SHA256}|g" \
            -e "s|@TARGET_PLATFORM@|${{ matrix.target_platform }}|g" \
            -e "s|@TARGET_VERSION@|${{ matrix.target_version }}|g" \
            -e "s|@TARGET_ARCH@|${{ matrix.target_arch }}|g" \
            packaging/plugin.xml.in > "$XML"
          echo "XML=$XML" >> $GITHUB_ENV
        shell: bash

      # -----------------------------------------------------------------------
      # Upload sur Cloudsmith — seulement sur les tags v*
      # Prérequis : secrets CLOUDSMITH_API_KEY et CLOUDSMITH_USER dans GitHub
      # -----------------------------------------------------------------------
      - name: Upload Cloudsmith
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CLOUDSMITH_USER: ${{ secrets.CLOUDSMITH_USER }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          pip install --quiet cloudsmith-cli
          cloudsmith push raw \
            --api-key "${CLOUDSMITH_API_KEY}" \
            "${CLOUDSMITH_USER}/stlaurent-indices-pi" \
            "${TARBALL}"
        shell: bash

      # -----------------------------------------------------------------------
      # Sauvegarder le XML de catalogue comme artefact GitHub
      # → à récupérer pour la PR dans opencpn/plugins
      # -----------------------------------------------------------------------
      - name: Upload XML catalogue
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: catalog-${{ matrix.tarball_suffix }}
          path: "catalog_${{ matrix.tarball_suffix }}.xml"
