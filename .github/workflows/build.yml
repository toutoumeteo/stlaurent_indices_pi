name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]       # ex: v1.0.0 → déclenche aussi le packaging/upload
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_path: build/libstlaurent_indices_pi.so
            tarball_suffix: ubuntu-x86_64
            target_platform: ubuntu-x86_64
            target_version: "24.04"
            target_arch: x86_64

          - os: macos-latest
            artifact_path: build/libstlaurent_indices_pi.dylib
            tarball_suffix: macos-arm64
            target_platform: macos-arm64
            target_version: "14"
            target_arch: arm64

          - os: windows-latest
            artifact_path: build/Release/stlaurent_indices_pi.dll
            tarball_suffix: win-x86_64
            target_platform: msvc-wx32
            target_version: "10"
            target_arch: x86_64

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Dépendances Linux
      # -----------------------------------------------------------------------
      - name: Dépendances (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libwxgtk3.2-dev libgdal-dev libgl-dev

      # -----------------------------------------------------------------------
      # Dépendances macOS
      # -----------------------------------------------------------------------
      - name: Dépendances (macOS)
        if: runner.os == 'macOS'
        run: brew install wxwidgets@3.2 gdal

      # -----------------------------------------------------------------------
      # Dépendances Windows
      # -----------------------------------------------------------------------
      # OpenCPN sur Windows est une application 32-bit (x86).
      # wxWidgets : binaires officiels 3.2 (lib/vc14x_dll, suffixe _vc14x sans _x64).
      # GDAL : vcpkg gdal:x86-windows (supporte x86 officiellement).
      - name: Cache wxWidgets (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\wxWidgets
          key: wxwidgets-3.2.6-vc14x-x86

      - name: wxWidgets 3.2 officiel vc14x x86 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "C:\wxWidgets\lib\vc14x_dll") {
            Write-Host "wxWidgets déjà en cache."; exit 0
          }
          $v = "3.2.6"
          $base = "https://github.com/wxWidgets/wxWidgets/releases/download/v$v"
          New-Item -ItemType Directory -Force C:\wxWidgets | Out-Null
          foreach ($f in @("wxWidgets-$v-headers.7z", "wxMSW-${v}_vc14x_Dev.7z")) {
            Write-Host "Téléchargement $f..."
            Invoke-WebRequest "$base/$f" -OutFile "$env:TEMP\$f"
            7z x "$env:TEMP\$f" -oC:\wxWidgets -y | Out-Null
          }

      - name: Cache vcpkg GDAL (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-gdal-x86-ocpn-v2-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: vcpkg-gdal-x86-ocpn-v2-

      - name: GDAL x86 via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Triplet personnalisé : openssl, curl et liblzma sont compilés en
          # bibliothèques statiques plutôt qu'en DLLs. Ils s'intègrent dans
          # gdal.dll à l'édition de liens, ce qui supprime libcrypto-3.dll,
          # libssl-3.dll, libcurl.dll et liblzma.dll du package.
          # Sans ces DLLs, le conflit de version avec celles pré-chargées par
          # opencpn.exe (même nom, API différente → erreur 127) disparaît.
          @(
            'set(VCPKG_TARGET_ARCHITECTURE x86)',
            'set(VCPKG_CRT_LINKAGE static)',
            'if(PORT MATCHES "^(openssl|curl|liblzma)$")',
            '    set(VCPKG_LIBRARY_LINKAGE static)',
            'else()',
            '    set(VCPKG_LIBRARY_LINKAGE dynamic)',
            'endif()'
          ) | Set-Content "C:\vcpkg\triplets\community\x86-windows-ocpn.cmake"

          vcpkg install gdal:x86-windows-ocpn

      # -----------------------------------------------------------------------
      # Configuration CMake
      # -----------------------------------------------------------------------
      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -A Win32 `
            -DwxWidgets_ROOT_DIR="C:\wxWidgets" `
            -DwxWidgets_LIB_DIR="C:\wxWidgets\lib\vc14x_dll" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x86-windows-ocpn

      # -----------------------------------------------------------------------
      # Compilation
      # -----------------------------------------------------------------------
      - name: Build
        run: cmake --build build --config Release --parallel

      # -----------------------------------------------------------------------
      # Artefact brut (téléchargeable depuis l'onglet Actions, toujours)
      # -----------------------------------------------------------------------
      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: stlaurent_indices_pi-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # Packaging tarball — seulement sur les tags v*
      # Crée un tarball avec cmake --install + tar, calcule le SHA256,
      # génère le fichier XML de catalogue OpenCPN.
      # -----------------------------------------------------------------------
      - name: Créer le tarball (Linux / macOS)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"   # retirer le "v" : v1.0.0 → 1.0.0
          TARBALL="stlaurent_indices_pi-${VERSION}-${{ matrix.tarball_suffix }}.tar.gz"

          cmake --install build --prefix /tmp/pkg

          # ---------------------------------------------------------------
          # macOS : bundler GDAL et ses dépendances transitives (proj, geos,
          # sqlite, …) pour un plugin autonome, sans Homebrew sur la machine
          # de l'utilisateur final.
          #
          # dylibbundler :
          #   1. Scanne le plugin et copie chaque dylib non-système dans PlugIns/
          #   2. Corrige récursivement les chemins absolus en @loader_path/<nom>
          #   3. macOS cherche ensuite les dylibs dans le même dossier que le
          #      plugin → aucune dépendance externe requise chez l'utilisateur.
          #
          # Les dylibs wxWidgets (déjà en @executable_path dans le bundle
          # OpenCPN) et les libs système (/usr/lib) sont laissées intactes.
          #
          # Re-signature ad-hoc : dylibbundler invalide les signatures Apple
          # existantes en modifiant les load commands ; codesign --sign -
          # appose une signature locale acceptée par macOS pour les plugins
          # chargés par une app tierce (OpenCPN).
          # ---------------------------------------------------------------
          if [[ "$(uname)" == "Darwin" ]]; then
            PLUGIN=/tmp/pkg/PlugIns/libstlaurent_indices_pi.dylib
            brew install dylibbundler
            dylibbundler -od -b -x "$PLUGIN" -d /tmp/pkg/PlugIns/ -p @loader_path/
            for f in /tmp/pkg/PlugIns/*.dylib; do
              codesign --force --sign - "$f" || true
            done
          fi

          cd /tmp/pkg && tar czf "$GITHUB_WORKSPACE/$TARBALL" .
          cd "$GITHUB_WORKSPACE"

          if command -v sha256sum >/dev/null; then
            SHA256=$(sha256sum "$TARBALL" | awk '{print $1}')
          else
            SHA256=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          fi

          echo "TARBALL=$TARBALL"       >> $GITHUB_ENV
          echo "VERSION=$VERSION"       >> $GITHUB_ENV
          echo "SHA256=$SHA256"         >> $GITHUB_ENV

      - name: Créer le tarball (Windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        run: |
          $VERSION = "${{ github.ref_name }}" -replace '^v', ''
          $TARBALL = "stlaurent_indices_pi-$VERSION-${{ matrix.tarball_suffix }}.zip"
          cmake --install build --config Release --prefix $env:TEMP\pkg

          # Copier les DLLs runtime de vcpkg dans plugins/
          # Exclusions :
          #   wx*          : fourni par OpenCPN lui-même
          #   libcrypto-3, libcurl, liblzma, libssl-3 : importés directement
          #                  par opencpn.exe et pré-chargés avant tout plugin ;
          #                  fournir nos copies provoquerait un conflit de version
          #                  (Windows réutilise la version déjà en mémoire) → erreur 127
          # Avec le triplet x86-windows-ocpn, openssl/curl/liblzma sont
          # statiques → libcrypto-3.dll, libssl-3.dll, libcurl.dll, liblzma.dll
          # n'existent plus dans le répertoire bin. L'exclusion explicite de ces
          # noms est conservée à titre de filet de sécurité.
          $vcpkgBin = "C:\vcpkg\installed\x86-windows-ocpn\bin"
          $dest = "$env:TEMP\pkg\plugins"
          Get-ChildItem "$vcpkgBin\*.dll" |
            Where-Object { $_.Name -notmatch "^wx" -and
                           $_.Name -notmatch "^(libcrypto|libcurl|liblzma|libssl)" } |
            ForEach-Object { Copy-Item $_.FullName $dest }

          Compress-Archive -Path "$env:TEMP\pkg\*" -DestinationPath $TARBALL
          $SHA256 = (Get-FileHash $TARBALL -Algorithm SHA256).Hash.ToLower()
          echo "TARBALL=$TARBALL"    >> $env:GITHUB_ENV
          echo "VERSION=$VERSION"   >> $env:GITHUB_ENV
          echo "SHA256=$SHA256"     >> $env:GITHUB_ENV

      - name: Générer le XML de catalogue
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          CLOUDSMITH_USER="${{ secrets.CLOUDSMITH_USER }}"
          URL="https://dl.cloudsmith.io/public/${CLOUDSMITH_USER}/stlaurent-indices-pi/raw/files/${TARBALL}"
          XML="catalog_${{ matrix.tarball_suffix }}.xml"

          sed \
            -e "s|@PLUGIN_VERSION@|${VERSION}|g" \
            -e "s|@TARBALL_URL@|${URL}|g" \
            -e "s|@TARBALL_SHA256@|${SHA256}|g" \
            -e "s|@TARGET_PLATFORM@|${{ matrix.target_platform }}|g" \
            -e "s|@TARGET_VERSION@|${{ matrix.target_version }}|g" \
            -e "s|@TARGET_ARCH@|${{ matrix.target_arch }}|g" \
            packaging/plugin.xml.in > "$XML"
          echo "XML=$XML" >> $GITHUB_ENV
        shell: bash

      # -----------------------------------------------------------------------
      # Upload sur Cloudsmith — seulement sur les tags v*
      # Prérequis : secrets CLOUDSMITH_API_KEY et CLOUDSMITH_USER dans GitHub
      # -----------------------------------------------------------------------
      - name: Upload Cloudsmith
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CLOUDSMITH_USER: ${{ secrets.CLOUDSMITH_USER }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          pip install --quiet cloudsmith-cli
          cloudsmith push raw \
            --api-key "${CLOUDSMITH_API_KEY}" \
            "${CLOUDSMITH_USER}/stlaurent-indices-pi" \
            "${TARBALL}"
        shell: bash

      # -----------------------------------------------------------------------
      # Sauvegarder le XML de catalogue comme artefact GitHub
      # → à récupérer pour la PR dans opencpn/plugins
      # -----------------------------------------------------------------------
      - name: Upload XML catalogue
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: catalog-${{ matrix.tarball_suffix }}
          path: "catalog_${{ matrix.tarball_suffix }}.xml"
