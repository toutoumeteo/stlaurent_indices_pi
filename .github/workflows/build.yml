name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_path: build/libstlaurent_indices_pi.so
          - os: macos-latest
            artifact_path: build/libstlaurent_indices_pi.dylib
          - os: windows-latest
            artifact_path: build/Release/stlaurent_indices_pi.dll

    steps:
      - uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Dépendances Linux
      # -----------------------------------------------------------------------
      - name: Dépendances (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libwxgtk3.2-dev libeccodes-dev

      # -----------------------------------------------------------------------
      # Dépendances macOS
      # -----------------------------------------------------------------------
      - name: Dépendances (macOS)
        if: runner.os == 'macOS'
        run: brew install wxwidgets eccodes

      # -----------------------------------------------------------------------
      # Dépendances Windows — vcpkg (pré-installé sur les runners GitHub)
      # -----------------------------------------------------------------------
      - name: Dépendances (Windows)
        if: runner.os == 'Windows'
        run: |
          vcpkg install wxwidgets:x64-windows eccodes:x64-windows
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows

      # -----------------------------------------------------------------------
      # Configuration CMake
      # -----------------------------------------------------------------------
      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      # -----------------------------------------------------------------------
      # Compilation
      # -----------------------------------------------------------------------
      - name: Build
        run: cmake --build build --config Release --parallel

      # -----------------------------------------------------------------------
      # Artefact téléchargeable depuis l'onglet Actions de GitHub
      # -----------------------------------------------------------------------
      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: stlaurent_indices_pi-${{ matrix.os }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
